<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Attic Shield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Roboto+Slab:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #0D0D0D;
      color: #F5F3EF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-family: 'Roboto Slab', serif; font-size: 6rem; color: #F2B947; line-height: 1; }
    h2 { font-size: 1.5rem; font-weight: 400; margin: 1rem 0 0.5rem; }
    p { color: rgba(245,243,239,0.6); margin-bottom: 2rem; }
    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #F2B947;
      color: #0D0D0D;
      text-decoration: none;
      font-weight: 700;
      border-radius: 4px;
      transition: background 0.3s;
    }
    a:hover { background: #d9a332; }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Looks like this room is empty.</h2>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Back to Home</a>
</body>
</html>
